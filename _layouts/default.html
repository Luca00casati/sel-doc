<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --accent2:   #79c0ff;
      --code-bg:   #1e2430;
      --sidebar-w: 260px;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.65;
      display: flex;
      min-height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
      padding: 1.5rem 0 2rem;
    }

    #sidebar .site-title {
      display: block;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent2);
      padding: 0 1.25rem 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    #sidebar .site-desc {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0 1.25rem 0.5rem;
    }

    #sidebar nav ul {
      list-style: none;
    }

    #sidebar nav ul li a {
      display: block;
      padding: 0.35rem 1.25rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      border-left: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    #sidebar nav ul li a:hover {
      color: var(--text);
      background: rgba(88,166,255,0.06);
    }

    #sidebar nav ul li a.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(88,166,255,0.08);
      font-weight: 600;
    }

    /* ===== MAIN CONTENT ===== */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-width: 0;
    }

    .page-content {
      max-width: 860px;
      padding: 2.5rem 2.5rem 4rem;
    }

    /* ===== TYPOGRAPHY ===== */
    h1, h2, h3, h4, h5, h6 {
      color: var(--text);
      font-weight: 600;
      line-height: 1.3;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }

    h1 { font-size: 2rem; margin-top: 0; }
    h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.35rem; }
    h3 { font-size: 1.15rem; }
    h4 { font-size: 1rem; }

    p { margin: 0.8rem 0; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    strong { font-weight: 600; }
    em     { font-style: italic; }

    ul, ol {
      margin: 0.5rem 0 0.5rem 1.5rem;
    }
    li { margin: 0.25rem 0; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* ===== INLINE CODE ===== */
    code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.35em;
      font-family: var(--font-mono);
      font-size: 0.82em;
      color: #f0a0a0;
    }

    /* ===== CODE BLOCKS ===== */
    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.1rem 1.25rem;
      overflow-x: auto;
      margin: 1rem 0;
      font-family: var(--font-mono);
      font-size: 0.84rem;
      line-height: 1.55;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
      color: inherit;
    }

    /* Rouge syntax highlighting (dark) */
    .highlight .c  { color: #6a9955; }   /* comment */
    .highlight .k  { color: #c792ea; }   /* keyword */
    .highlight .s  { color: #ce9178; }   /* string */
    .highlight .s1 { color: #ce9178; }
    .highlight .s2 { color: #ce9178; }
    .highlight .mi { color: #b5cea8; }   /* integer */
    .highlight .mf { color: #b5cea8; }   /* float */
    .highlight .n  { color: #9cdcfe; }   /* name */
    .highlight .o  { color: #d4d4d4; }   /* operator */
    .highlight .p  { color: #d4d4d4; }   /* punctuation */
    .highlight .nb { color: #dcdcaa; }   /* builtin */
    .highlight .nf { color: #dcdcaa; }   /* function name */
    .highlight .err{ background: none; } /* suppress error backgrounds */

    /* ===== TABLES ===== */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: 0.9rem;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }

    th {
      background: var(--surface);
      font-weight: 600;
      color: var(--accent2);
    }

    tr:nth-child(even) { background: rgba(255,255,255,0.02); }

    /* ===== BLOCKQUOTE ===== */
    blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      color: var(--muted);
      background: rgba(88,166,255,0.05);
      border-radius: 0 4px 4px 0;
    }

    /* ===== DETAILS / TOC ===== */
    details {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      background: var(--surface);
    }

    summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--accent2);
      font-size: 0.9rem;
    }

    details[open] summary { margin-bottom: 0.5rem; }

    /* ===== FOOTER ===== */
    footer {
      margin-left: var(--sidebar-w);
      border-top: 1px solid var(--border);
      padding: 1rem 2.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 700px) {
      :root { --sidebar-w: 0px; }
      #sidebar { display: none; }
      #main    { margin-left: 0; }
      footer   { margin-left: 0; }
      .page-content { padding: 1.5rem 1rem 3rem; }
    }
  </style>
</head>
<body>

<aside id="sidebar">
  <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
  <p class="site-desc">{{ site.description }}</p>
  <nav>
    <ul>
      {% for item in site.nav %}
      <li>
        <a href="{{ item.url | relative_url }}"
           {% assign url_slash = item.url | append: '/' %}{% if page.url == item.url or page.url == url_slash %}class="active"{% endif %}>
          {{ item.title }}
        </a>
      </li>
      {% endfor %}
    </ul>
  </nav>
</aside>

<div id="main">
  <div class="page-content">
    {{ content }}
  </div>
  <footer>
    &copy; {{ site.time | date: "%Y" }} sel — built with <a href="https://jekyllrb.com">Jekyll</a>
  </footer>
</div>

</body>
</html>
